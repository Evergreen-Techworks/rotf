# Ordinary Client / ROTF — nginx reverse proxy (EC2). certbot adds the 443 block.
# - The app/account server endpoints (/account/*, /char/*, /app/*, /sfx/*, /music/*,
#   crossdomain.xml) proxy to the .NET app server on 127.0.0.1:8080.
# - The web launcher (Next.js) + the client SWF download proxy to 127.0.0.1:3000.
# The world server (TCP :2050) and Flash policy (:843) are raw TCP — NOT proxied by
# nginx; open those ports directly in the EC2 security group.

server {
    listen 80;
    server_name play.rotf.example;   # <-- set your domain

    client_max_body_size 8m;

    # Game app-server endpoints (the Flash client hits these)
    location ~ ^/(account|char|app|fame|guild|sfx|music)/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;   # client reads this for ClientIP
    }
    location = /crossdomain.xml { proxy_pass http://127.0.0.1:8080; }

    # Web launcher / download site (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
